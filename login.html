<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Employee Management System</title>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/all.min.css" rel="stylesheet">
    <link href="/assets/css/fontawesome-fix.css" rel="stylesheet">
    <link href="/assets/css/dark-theme.css" rel="stylesheet">
    <style>
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1628 0%, #0d1f2d 60%, #0a2a3a 100%);
        }
        .login-card {
            background: #1e2d3d;
            border: 1px solid #2d3f52;
            border-radius: 16px;
        }
        .login-card .form-label { color: #a0aec0; }
        .login-card h3 { color: #ffffff; }
        .login-card .text-muted { color: #6b7f94 !important; }
        .login-card small { color: #6b7f94; }
        .login-card a { color: #00d4b8 !important; }
        .login-card hr { border-color: #2d3f52; }
    </style>
</head>
<body>
    <div class="login-container d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card login-card shadow-lg border-0">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="fas fa-user-circle" style="font-size: 4rem; color: #00d4b8;"></i>
                                <h3 class="mt-3">Welcome Back</h3>
                                <p class="text-muted">Sign in to your account</p>
                            </div>

                            <div id="error-message" class="alert alert-danger" style="display: none;" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i><span id="error-text"></span>
                            </div>

                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                        <input type="email" class="form-control" id="email" name="email" required>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="password" class="form-label">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                        <input type="password" class="form-control" id="password" name="password" required>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 mb-3">
                                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                                </button>
                            </form>

                            <div class="text-center">
                                <small class="text-muted">
                                    <a href="/" class="text-decoration-none">
                                        <i class="fas fa-arrow-left me-1"></i>Back to Home
                                    </a>
                                </small>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Copyright Footer -->
    <footer class="fixed-bottom bg-dark text-white py-2">
        <div class="container text-center">
            <small>
                © 2025/26 Employee Management System. All rights reserved. | Prepared by Wondwosen Tefera
            </small>
        </div>
    </footer>

    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            try {
                const response = await fetchApi('/api/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Use configurable server URL for redirect
                    const serverUrl = window.configManager.getServerUrl();
                    window.location.href = serverUrl + '/dashboard';
                } else {
                    errorText.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorText.textContent = 'Connection error. Please check server configuration.';
                errorDiv.style.display = 'block';
                console.error('Login error:', error);
            }
        });
        
        // Show connection status on page load
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                await window.configManager.init();
                console.log('Login page - Server configured:', window.configManager.getServerUrl());
            } catch (error) {
                console.error('Configuration error:', error);
            }
        });
    </script>
</body>
</html>
