<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - Employee Management System</title>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/all.min.css" rel="stylesheet">
    <link href="/assets/css/dark-theme.css" rel="stylesheet">
    <link href="assets/css/dashboard.css" rel="stylesheet">
    <style>
        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 56px;
                left: -100%;
                width: 250px;
                height: calc(100vh - 56px);
                transition: left 0.3s ease;
                z-index: 1000;
                overflow-y: auto;
            }
            
            .sidebar.show {
                left: 0;
            }
            
            .main-content {
                margin-left: 0 !important;
                padding-left: 15px;
                padding-right: 15px;
            }
            
            .navbar-brand {
                font-size: 1rem;
            }
            
            .btn-toolbar {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn-toolbar .btn {
                width: 100%;
            }
            
            .card-body {
                padding: 1rem;
            }
            
            .col-md-6,
            .col-lg-4 {
                margin-bottom: 1rem;
            }
            
            .modal-dialog {
                margin: 1rem;
            }
            
            .form-label {
                font-weight: 600;
                margin-bottom: 0.25rem;
            }
        }
        
        @media (max-width: 576px) {
            .container-fluid {
                padding-left: 10px;
                padding-right: 10px;
            }
            
            .card {
                margin-bottom: 1rem;
            }
            
            .card-header h5 {
                font-size: 1rem;
            }
            
            .btn {
                font-size: 0.875rem;
                padding: 0.5rem 1rem;
            }
            
            .h2 {
                font-size: 1.5rem;
            }
            
            .navbar-brand {
                font-size: 0.9rem;
            }
            
            .form-control {
                font-size: 0.875rem;
            }
            
            .alert {
                font-size: 0.875rem;
                padding: 0.75rem;
            }
        }
        
        /* Mobile Navigation Toggle */
        .mobile-nav-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.25rem;
            padding: 0.25rem 0.5rem;
        }
        
        @media (max-width: 768px) {
            .mobile-nav-toggle {
                display: block;
            }
        }
        
        /* Touch-friendly improvements */
        @media (hover: none) and (pointer: coarse) {
            .btn {
                min-height: 44px;
            }
            
            .form-control {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <button class="mobile-nav-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-building me-2"></i>Employee Management System
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i>Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid" style="padding-top: 56px;">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar" id="sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="/dashboard">
                                <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/employees">
                                <i class="fas fa-users me-2"></i>Employees
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/departments">
                                <i class="fas fa-building me-2"></i>Departments
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/attendance">
                                <i class="fas fa-clock me-2"></i>Attendance
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/leave">
                                <i class="fas fa-calendar-alt me-2"></i>Leave Management
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/reports">
                                <i class="fas fa-chart-bar me-2"></i>Reports
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/id-badges">
                                <i class="fas fa-id-card me-2"></i>ID Badges
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Departments</h1>
                    <div class="btn-toolbar mb-2 mb-md-0" id="admin-manager-controls" style="display: none;">
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDepartmentModal">
                            <i class="fas fa-plus me-1"></i>Add Department
                        </button>
                    </div>
                </div>

                <div class="row" id="departments-grid">
                    <div class="col-12 text-center">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2">Loading departments...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Department Modal -->
    <div class="modal fade" id="addDepartmentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Department</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="departmentForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="dept_name" class="form-label">Department Name *</label>
                            <input type="text" class="form-control" id="dept_name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="dept_description" class="form-label">Description</label>
                            <textarea class="form-control" id="dept_description" name="description" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Department</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="/assets/js/analytics.js"></script>
    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async function() {
            await checkUserAccess();
            loadDepartments();
            
            document.getElementById('departmentForm').addEventListener('submit', handleAddDepartment);
        });

        async function checkUserAccess() {
            try {
                const response = await fetchApi('/api/user');
                if (response.ok) {
                    currentUser = await response.json();
                    
                    // Show add department controls only for admin and manager
                    if (currentUser.role === 'admin' || currentUser.role === 'manager') {
                        document.getElementById('admin-manager-controls').style.display = 'block';
                    }
                    
                    // Employees can view departments but cannot add/edit
                    if (currentUser.role === 'employee') {
                        console.log('Employee access: View-only mode for departments');
                    }
                    
                    return true;
                } else {
                    window.location.href = window.configManager.getServerUrl() + '/login';
                    return false;
                }
            } catch (error) {
                console.error('Error checking user access:', error);
                window.location.href = window.configManager.getServerUrl() + '/login';
                return false;
            }
        }

        async function loadDepartments() {
            try {
                const response = await fetchApi('/api/departments');
                if (response.ok) {
                    const result = await response.json();
                    displayDepartments(result.data);
                } else {
                    document.getElementById('departments-grid').innerHTML = 
                        '<div class="col-12 text-center text-danger">Failed to load departments</div>';
                }
            } catch (error) {
                console.error('Error loading departments:', error);
                document.getElementById('departments-grid').innerHTML = 
                    '<div class="col-12 text-center text-danger">Error loading departments</div>';
            }
        }

        function displayDepartments(departments) {
            const grid = document.getElementById('departments-grid');
            
            if (departments.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center">No departments found</div>';
                return;
            }

            grid.innerHTML = departments.map(dept => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">
                                <i class="fas fa-building text-primary me-2"></i>
                                ${dept.name}
                            </h5>
                            <p class="card-text">${dept.description || 'No description available'}</p>
                        </div>
                        <div class="card-footer bg-transparent">
                            <small class="text-muted">
                                <i class="fas fa-users me-1"></i>
                                <span id="dept-${dept.id}-count">Loading...</span> employees
                            </small>
                        </div>
                    </div>
                </div>
            `).join('');

            // Load employee counts for each department
            departments.forEach(dept => {
                loadEmployeeCount(dept.id, dept.name);
            });
        }

        async function loadEmployeeCount(deptId, deptName) {
            try {
                const response = await fetchApi('/api/employees');
                if (response.ok) {
                    const result = await response.json();
                    const count = result.data.filter(emp => emp.department === deptName).length;
                    document.getElementById(`dept-${deptId}-count`).textContent = count;
                }
            } catch (error) {
                document.getElementById(`dept-${deptId}-count`).textContent = '0';
            }
        }

        async function handleAddDepartment(e) {
            e.preventDefault();
            
            // Check access control
            if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'manager')) {
                showAlert('danger', 'Access denied. Only administrators and managers can add departments.');
                return;
            }
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetchApi('/api/departments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('success', 'Department added successfully!');
                    
                    const modal = bootstrap.Modal.getInstance(document.getElementById('addDepartmentModal'));
                    modal.hide();
                    
                    document.getElementById('departmentForm').reset();
                    
                    // Reload departments
                    setTimeout(() => {
                        loadDepartments();
                    }, 1000);
                } else {
                    showAlert('danger', result.error || 'Failed to add department');
                }
                
            } catch (error) {
                console.error('Error adding department:', error);
                showAlert('danger', 'An error occurred while adding the department');
            }
        }

        function showAlert(type, message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
            alertDiv.style.cssText = 'top: 70px; right: 20px; z-index: 9999; min-width: 300px;';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                if (alertDiv.parentNode) {
                    alertDiv.parentNode.removeChild(alertDiv);
                }
            }, 5000);
        }

        async function logout() {
            try {
                await fetchApi('/api/logout', { method: 'POST' });
                window.location.href = window.configManager.getServerUrl() + '/';
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = window.configManager.getServerUrl() + '/';
            }
        }

        // Mobile navigation toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('show');
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.querySelector('.mobile-nav-toggle');
            
            if (window.innerWidth <= 768 && 
                !sidebar.contains(event.target) && 
                !toggle.contains(event.target) && 
                sidebar.classList.contains('show')) {
                sidebar.classList.remove('show');
            }
        });
    </script>

    <!-- Copyright Footer -->
    <footer class="bg-dark text-white py-2 mt-4">
        <div class="container text-center">
            <small>
                © 2025/26 Employee Management System. All rights reserved. | Prepared by Wondwosen Tefera
            </small>
        </div>
    </footer>
</body>
</html>
